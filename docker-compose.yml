# =============================================================================
# Antigravity Remote Docker - Docker Compose Configuration
# =============================================================================
# Usage:
#   Start:    docker-compose up -d
#   Stop:     docker-compose down
#   Logs:     docker-compose logs -f
#   Rebuild:  docker-compose up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Docker Socket Proxy - safe Docker API access for AI agents
  # ---------------------------------------------------------------------------
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: antigravity-docker-proxy
    environment:
      CONTAINERS: 1   # list/inspect containers
      EXEC: 1         # docker exec into containers
      POST: 1         # restart, stop, etc.
      INFO: 1         # docker info
      IMAGES: 1       # list images
      BUILD: 1        # block image builds (enable if agents need it)
      SWARM: 0
      NETWORKS: 1     # inspect networks
      VOLUMES: 1      # inspect volumes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - asr-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Main Antigravity Container
  # ---------------------------------------------------------------------------
  antigravity:
    build:
      context: .
      dockerfile: Dockerfile
    image: antigravity-remote:latest
    container_name: antigravity-remote

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
        limits:
          memory: 16G
          cpus: '8'

    environment:
      - DISPLAY_WIDTH=${DISPLAY_WIDTH:-1920}
      - DISPLAY_HEIGHT=${DISPLAY_HEIGHT:-1080}
      - DISPLAY_DEPTH=24
      - VNC_PASSWORD=${VNC_PASSWORD:-antigravity}
      - TZ=${TZ:-America/Denver}
      - ANTIGRAVITY_AUTO_UPDATE=${ANTIGRAVITY_AUTO_UPDATE:-true}
      - AUTOSTART_ANTIGRAVITY=${AUTOSTART_ANTIGRAVITY:-true}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - IDLE_CHECK_INTERVAL=${IDLE_CHECK_INTERVAL:-30}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-60}
      - IDLE_PAUSE_ANTIGRAVITY=${IDLE_PAUSE_ANTIGRAVITY:-false}
      # Point Docker CLI inside the container to the proxy, not the raw socket
      - DOCKER_HOST=tcp://docker-proxy:2375

    ports:
      - "6080:6080"
      - "5901:5901"

    volumes:
      - ./data/workspace:/home/antigravity/workspace
      - ./data/config:/home/antigravity/.config
      - ./data/antigravity:/home/antigravity/.antigravity
      - ./data/gemini:/home/antigravity/.gemini
      - ./data/local:/home/antigravity/.local

    runtime: nvidia

    security_opt:
      - seccomp:unconfined

    cap_add:
      - NET_ADMIN

    shm_size: '2gb'
    restart: unless-stopped

    networks:
      - asr-network

    depends_on:
      - docker-proxy

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6080/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# =============================================================================
# Networks — TOP LEVEL, not under any service
# =============================================================================
networks:
  asr-network:
    external: true
    name: docker_asr-network

    
